
name : deployment to github pages

on  : [ push ]

jobs : 
  runs-on : ubuntu-latest 

  deploy : 

    - name : checkout 
      uses : actions/checkout@v3 

    - name : deploy 
      uses : peaceiris/actions-gh-pages@v3 

      with : 
         github_token : ${{ secrets.GITHUB_TOKEN }}
         publish_dir : . 


    
